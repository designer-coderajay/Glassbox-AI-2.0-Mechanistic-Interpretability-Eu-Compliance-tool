name: Publish to PyPI

# Triggers on any tag that starts with "v" (e.g. v2.3.4, v2.4.0)
# Uses OIDC Trusted Publisher — no API token required.
#
# One-time setup (already done by repo owner):
#   https://pypi.org/manage/project/glassbox-mech-interp/settings/publishing/
#   → Trusted Publisher settings:
#       Owner:    designer-coderajay
#       Repo:     Glassbox-AI-2.0-Mechanistic-Interpretability-tool
#       Workflow: publish.yml
#       Env:      pypi   ← must match the environment: name below
#
# GitHub repo setup:
#   Settings → Environments → create "pypi" (no extra rules needed)

on:
  push:
    tags: ["v*"]

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build
        run: pip install build --quiet

      - name: Build wheel + sdist
        run: python -m build

      - name: Show what was built
        run: ls -lh dist/

      - name: Upload dist as artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.ref_name }}
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest

    # "pypi" must match the Environment name you entered in PyPI's
    # Trusted Publisher settings.  If you left it blank on PyPI, delete
    # the environment block below AND update the comment in the header.
    environment:
      name: pypi
      url: https://pypi.org/p/glassbox-mech-interp

    permissions:
      id-token: write   # required for OIDC Trusted Publisher

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.ref_name }}
          path: dist/

      # ── PyPI OIDC diagnostic ─────────────────────────────────────────────
      # Calls PyPI's mint-token endpoint directly so the exact error is
      # captured in an artifact even without admin log access.
      - name: Diagnose OIDC → PyPI mint-token
        run: |
          python3 << 'PYEOF'
          import os, urllib.request, json, base64

          report = []

          # 1. Fetch OIDC token
          url = os.environ['ACTIONS_ID_TOKEN_REQUEST_URL'] + '&audience=pypi'
          req = urllib.request.Request(
              url, headers={"Authorization": f"bearer {os.environ['ACTIONS_ID_TOKEN_REQUEST_TOKEN']}"}
          )
          with urllib.request.urlopen(req) as r:
              oidc_token = json.loads(r.read())['value']

          # 2. Decode and print claims
          payload = oidc_token.split('.')[1]
          payload += '=' * (4 - len(payload) % 4)
          claims = json.loads(base64.urlsafe_b64decode(payload))
          report.append('=== OIDC token claims (must match PyPI Trusted Publisher config) ===')
          for k in ['repository','repository_owner','workflow','environment','ref','job_workflow_ref']:
              report.append(f'  {k}: {claims.get(k,"<not present>")}')

          # 3. Call PyPI mint-token — capture success OR failure body
          import urllib.error
          data = json.dumps({'token': oidc_token}).encode()
          req2 = urllib.request.Request(
              'https://pypi.org/_/oidc/github/mint-token',
              data=data,
              headers={'Content-Type': 'application/json'}
          )
          try:
              with urllib.request.urlopen(req2) as r:
                  report.append('\n=== PyPI mint-token: SUCCESS (OIDC auth is fine) ===')
          except urllib.error.HTTPError as e:
              report.append(f'\n=== PyPI mint-token ERROR {e.code} ===')
              report.append(e.read().decode())

          text = '\n'.join(report)
          print(text)
          with open('oidc_diagnosis.txt', 'w') as f:
              f.write(text)

          # Also echo claims as error annotations so they appear in PR checks
          for line in report:
              if line.strip():
                  print(f'::notice::{line.strip()}')
          PYEOF

      - name: Upload OIDC diagnosis artifact
        uses: actions/upload-artifact@v4
        with:
          name: oidc-diagnosis-${{ github.ref_name }}
          path: oidc_diagnosis.txt

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
          verbose: true
