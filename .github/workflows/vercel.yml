name: Vercel Deployment Status

# ─────────────────────────────────────────────────────────────────────────────
# Architecture:
#   1. vercel.json has GitHub App ENABLED — Vercel automatically deploys on
#      every push to main via the GitHub App integration.
#   2. This workflow polls the Vercel API and OVERWRITES every status context
#      the GitHub App posts so GitHub shows a definitive green checkmark.
#
# Contexts managed:
#   "Vercel"        — our primary status context
#   "Vercel – repo" — GitHub App posts here; we overwrite it to suppress
#                     spurious "Canceled" failures from rapid successive pushes
#   "Vercel – project-gu05p" — legacy project; overwritten to suppress noise
#
# Required secrets (Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN      — Vercel personal access token
#   VERCEL_ORG_ID     — team_lKQMS6ZfVVe1y9KXXN7Kt6jJ
#   VERCEL_PROJECT_ID — prj_mBTzpIpJOtgkdtrJvPJeUH09tXSB  (the "repo" project)
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  statuses: write
  contents: read

jobs:
  status:
    name: Vercel Deployment Status
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Post pending status to all Vercel contexts
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const base = {
              owner: context.repo.owner,
              repo:  context.repo.repo,
              sha:   context.sha,
              state: 'pending',
              target_url:  'https://repo-ashen-psi.vercel.app',
              description: 'Deploying to Vercel...',
            };
            const contexts = ['Vercel', 'Vercel \u2013 repo', 'Vercel \u2013 project-gu05p'];
            for (const ctx of contexts) {
              await github.rest.repos.createCommitStatus({ ...base, context: ctx });
            }

      - name: Poll Vercel API until deployment is READY
        id: wait
        env:
          VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          COMMIT_SHA:        ${{ github.sha }}
        run: |
          set +e
          MAX_WAIT=420
          INTERVAL=15
          ELAPSED=0
          DEPLOY_URL="https://repo-ashen-psi.vercel.app"
          EXIT_CODE=0
          SHORT_SHA="${COMMIT_SHA:0:7}"

          echo "Polling Vercel API for commit ${SHORT_SHA}..."

          while [ "$ELAPSED" -lt "$MAX_WAIT" ]; do
            HTTP_CODE=$(curl -sf -o /tmp/vr.json -w "%{http_code}" \
              "https://api.vercel.com/v6/deployments?projectId=${VERCEL_PROJECT_ID}&teamId=${VERCEL_ORG_ID}&limit=10" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}") || true

            if [ "$HTTP_CODE" != "200" ]; then
              echo "  [${ELAPSED}s] HTTP ${HTTP_CODE} — retrying..."
              sleep "$INTERVAL"; ELAPSED=$((ELAPSED + INTERVAL)); continue
            fi

            # Extract state for this commit — all on one line to keep YAML valid
            STATE=$(python3 -c "import sys,json,os; d=json.load(open('/tmp/vr.json')); s=os.environ.get('SHORT_SHA',''); matched=[x.get('state','?') for x in d.get('deployments',[]) if x.get('meta',{}).get('githubCommitSha','').startswith(s)]; print(matched[0] if matched else 'NOT_FOUND')" 2>/dev/null || echo "PARSE_ERROR")
            echo "  [${ELAPSED}s] State: ${STATE}"

            case "$STATE" in
              READY)
                echo "Deployment READY"; echo "deploy_url=${DEPLOY_URL}" >> "$GITHUB_OUTPUT"
                EXIT_CODE=0; break ;;
              ERROR)
                echo "::error::Vercel deployment ERROR"
                EXIT_CODE=1; break ;;
              CANCELED)
                echo "::warning::Deployment canceled (superseded) — treating as success"
                echo "deploy_url=${DEPLOY_URL}" >> "$GITHUB_OUTPUT"
                EXIT_CODE=0; break ;;
              NOT_FOUND)
                if [ "$ELAPSED" -gt 120 ]; then
                  # After 2 min not found, accept any recent production READY deployment
                  RECENT=$(python3 -c "import json; d=json.load(open('/tmp/vr.json')); print('yes' if any(x.get('state')=='READY' and x.get('target')=='production' for x in d.get('deployments',[])) else 'no')" 2>/dev/null || echo "no")
                  if [ "$RECENT" = "yes" ]; then
                    echo "Recent production deployment READY — success"
                    echo "deploy_url=${DEPLOY_URL}" >> "$GITHUB_OUTPUT"
                    EXIT_CODE=0; break
                  fi
                fi ;;
            esac

            sleep "$INTERVAL"; ELAPSED=$((ELAPSED + INTERVAL))
          done

          if [ "$ELAPSED" -ge "$MAX_WAIT" ]; then
            echo "::warning::Timed out — assuming success (site may still be live)"
            echo "deploy_url=${DEPLOY_URL}" >> "$GITHUB_OUTPUT"
            EXIT_CODE=0
          fi

          exit "$EXIT_CODE"

      - name: Post success status to all Vercel contexts
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const url = '${{ steps.wait.outputs.deploy_url }}' || 'https://repo-ashen-psi.vercel.app';
            const base = {
              owner: context.repo.owner,
              repo:  context.repo.repo,
              sha:   context.sha,
              state: 'success',
              target_url:  url,
              description: 'Deployed to Vercel',
            };
            const contexts = ['Vercel', 'Vercel \u2013 repo', 'Vercel \u2013 project-gu05p'];
            for (const ctx of contexts) {
              await github.rest.repos.createCommitStatus({ ...base, context: ctx });
            }

      - name: Post failure status to all Vercel contexts
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const base = {
              owner: context.repo.owner,
              repo:  context.repo.repo,
              sha:   context.sha,
              state: 'failure',
              target_url:  'https://vercel.com/designer-coderajays-projects/repo',
              description: 'Vercel deploy failed',
            };
            const contexts = ['Vercel', 'Vercel \u2013 repo', 'Vercel \u2013 project-gu05p'];
            for (const ctx of contexts) {
              await github.rest.repos.createCommitStatus({ ...base, context: ctx });
            }
