<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="frameGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F0946E;stop-opacity:1"/>
      <stop offset="28%" style="stop-color:#E8724A;stop-opacity:1"/>
      <stop offset="56%" style="stop-color:#0891B2;stop-opacity:1"/>
      <stop offset="80%" style="stop-color:#0891B2;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#E8724A;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#F0946E;stop-opacity:0.8"/>
      <stop offset="40%" style="stop-color:#E8724A;stop-opacity:0.4"/>
      <stop offset="75%" style="stop-color:#E8724A;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#E8724A;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="scanGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#38BDF8;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#38BDF8;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Glass fill -->
  <rect x="5" y="5" width="90" height="90" rx="10.35" ry="10.35"
        fill="#E8724A" fill-opacity="0.032"/>

  <!-- Scan line glow -->
  <rect x="5" y="44" width="90" height="12" rx="6"
        fill="url(#scanGlow)"/>

  <!-- Rounded-square gradient frame -->
  <rect x="5" y="5" width="90" height="90" rx="10.35" ry="10.35"
        fill="none" stroke="url(#frameGrad)" stroke-width="1.75"/>

  <!-- Glow layers for primary node -->
  <circle cx="50" cy="33.8" r="26" fill="#E8724A" fill-opacity="0.04"/>
  <circle cx="50" cy="33.8" r="20" fill="#E8724A" fill-opacity="0.07"/>
  <circle cx="50" cy="33.8" r="15" fill="#E8724A" fill-opacity="0.11"/>
  <circle cx="50" cy="33.8" r="11" fill="#E8724A" fill-opacity="0.16"/>
  <circle cx="50" cy="33.8" r="7.5" fill="#E8724A" fill-opacity="0.22"/>

  <!-- Primary node -->
  <circle cx="50" cy="33.8" r="9.8" fill="#E8724A"/>
  <circle cx="50" cy="33.8" r="3.5" fill="#F0946E"/>
  <circle cx="50" cy="33.8" r="1.5" fill="white" fill-opacity="0.96"/>

  <!-- Stem (primary → branch point) -->
  <line x1="50" y1="43.5" x2="50" y2="56.5"
        stroke="#0891B2" stroke-width="1.05" stroke-opacity="0.38"/>

  <!-- Left L-bend: down from branch → left → down to pad -->
  <polyline points="50,56.5 50,64.5 23,64.5 23,74.3"
            fill="none" stroke="#0891B2" stroke-width="0.9" stroke-opacity="0.34"
            stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- Right L-bend: down from branch → right → down to pad -->
  <polyline points="50,56.5 50,64.5 77,64.5 77,74.3"
            fill="none" stroke="#38BDF8" stroke-width="0.9" stroke-opacity="0.34"
            stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- PCB pads -->
  <rect x="20" y="72.3" width="6" height="6" fill="#0891B2" fill-opacity="0.48"/>
  <rect x="74" y="72.3" width="6" height="6" fill="#38BDF8" fill-opacity="0.48"/>
</svg>